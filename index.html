<!DOCTYPE html>
<html>
<head>
<title>Ticket Maker 3.2</title>
<style>
body {
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #1e1e2f, #2b2b45);
    color: white;
    text-align: center;
    padding: 30px;
}

.container {
    background: #2f2f50;
    padding: 20px;
    border-radius: 15px;
    width: 350px;
    margin: auto;
    box-shadow: 0 0 15px black;
}

input {
    width: 90%;
    padding: 8px;
    margin: 8px 0;
    border-radius: 5px;
    border: none;
}

button {
    padding: 8px 12px;
    margin: 5px;
    border: none;
    border-radius: 5px;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #ff1f4b;
}

.ticket {
    margin-top: 20px;
    background: #2f2f50;
    color: white;
    border-radius: 15px;
    padding: 15px;
    width: 350px;
    margin-left: auto;
    margin-right: auto;
}

.delete-btn {
    background: #444;
}

.delete-btn:hover {
    background: #222;
}

.saved-section {
    margin-top: 40px;
}
</style>
</head>

<body>

<h1>🎟️ Ticket Maker 3.2</h1>

<div class="container">
    <input type="text" id="name" placeholder="Your Name">
    <input type="text" id="seat" placeholder="Seat Number">
    <input type="date" id="date">
    <br>
    <button onclick="generateTicket()">Generate</button>
    <button onclick="saveTicket()">Save Ticket</button>
</div>

<div id="ticketArea"></div>

<div class="saved-section">
    <h2>💾 Saved Tickets</h2>
    <button class="delete-btn" onclick="deleteAllTickets()">Delete All</button>
    <div id="savedTickets"></div>
</div>

<script>
let currentTicket = null;

function generateTicket() {
    const name = document.getElementById("name").value;
    const seat = document.getElementById("seat").value;
    const date = document.getElementById("date").value;

    if (!name || !seat || !date) {
        alert("Fill in all fields!");
        return;
    }

    const ticketID = "TKT-" + Math.floor(100000 + Math.random() * 900000);

    currentTicket = { id: ticketID, name, seat, date };

    displayTicket(currentTicket);
}

function displayTicket(ticket) {
    document.getElementById("ticketArea").innerHTML = `
        <div class="ticket">
            <h2>🎫 Ticket</h2>
            <p><strong>ID:</strong> ${ticket.id}</p>
            <p><strong>Name:</strong> ${ticket.name}</p>
            <p><strong>Seat:</strong> ${ticket.seat}</p>
            <p><strong>Date:</strong> ${ticket.date}</p>
        </div>
    `;
}

function saveTicket() {
    if (!currentTicket) {
        alert("Generate a ticket first!");
        return;
    }

    let tickets = JSON.parse(localStorage.getItem("tickets")) || [];
    tickets.push(currentTicket);
    localStorage.setItem("tickets", JSON.stringify(tickets));

    loadSavedTickets();
}

function deleteTicket(index) {
    let tickets = JSON.parse(localStorage.getItem("tickets")) || [];
    tickets.splice(index, 1);
    localStorage.setItem("tickets", JSON.stringify(tickets));
    loadSavedTickets();
}

function deleteAllTickets() {
    if (confirm("Delete ALL tickets?")) {
        localStorage.removeItem("tickets");
        loadSavedTickets();
    }
}

function loadSavedTickets() {
    const savedDiv = document.getElementById("savedTickets");
    let tickets = JSON.parse(localStorage.getItem("tickets")) || [];

    savedDiv.innerHTML = "";

    tickets.forEach((ticket, index) => {
        savedDiv.innerHTML += `
            <div class="ticket">
                <p>ID: ${ticket.id}</p>
                <p>Name: ${ticket.name}</p>
                <p>Seat: ${ticket.seat}</p>
                <p>Date: ${ticket.date}</p>
                <button class="delete-btn" onclick="deleteTicket(${index})">Delete</button>
            </div>
        `;
    });
}

window.onload = loadSavedTickets;
</script>

</body>
</html>
