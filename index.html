<!DOCTYPE html>
<html>
<head>
<title>Ticket Maker</title>

<style>
body{
  font-family: Arial, sans-serif;
  background:#0f172a;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  margin:0;
}

.container{
  background:#1e293b;
  padding:25px;
  border-radius:15px;
  width:400px;
  box-shadow:0 0 20px rgba(0,0,0,0.5);
}

h2{
  text-align:center;
}

input{
  width:100%;
  padding:10px;
  margin:8px 0;
  border-radius:8px;
  border:2px solid #334155;
  background:#0f172a;
  color:white;
  outline:none;
}

input:focus{
  border:2px solid #22c55e;
}

button{
  padding:10px;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-weight:bold;
}

.generate{
  width:100%;
  background:#22c55e;
  margin-top:10px;
}

.generate:hover{
  background:#16a34a;
}

.deleteAll{
  width:100%;
  background:#ef4444;
  color:white;
  margin-top:10px;
}

.deleteAll:hover{
  background:#dc2626;
}

.ticket{
  background:#111827;
  border:2px solid #22c55e;
  padding:12px;
  border-radius:12px;
  margin-top:15px;
}

.ticket button{
  background:#ef4444;
  color:white;
  margin-top:8px;
}

.ticket button:hover{
  background:#dc2626;
}
</style>
</head>

<body>

<div class="container">
  <h2>🎟 Ticket Maker</h2>

  <input type="text" id="name" placeholder="Enter Name">
  <input type="date" id="day">
  <input type="time" id="time">
  <input type="email" id="email" placeholder="Enter Email">

  <button class="generate" onclick="generateTicket()">Generate Ticket</button>
  <button class="deleteAll" onclick="deleteAll()">Delete All Tickets</button>

  <div id="ticketList"></div>
</div>

<script>

let tickets = JSON.parse(localStorage.getItem("tickets")) || [];

function saveTickets(){
  localStorage.setItem("tickets", JSON.stringify(tickets));
}

function renderTickets(){
  let ticketList = document.getElementById("ticketList");
  ticketList.innerHTML = "";

  tickets.forEach((ticket, index) => {
    let div = document.createElement("div");
    div.className = "ticket";

    div.innerHTML = `
      <strong>Event Ticket</strong><br>
      Name: ${ticket.name}<br>
      Day: ${ticket.day}<br>
      Time: ${ticket.time}<br>
      Email: ${ticket.email}<br>
      <button onclick="deleteOne(${index})">Delete</button>
    `;

    ticketList.appendChild(div);
  });
}

function generateTicket(){
  let name = document.getElementById("name").value;
  let day = document.getElementById("day").value;
  let time = document.getElementById("time").value;
  let email = document.getElementById("email").value;

  if(!name || !day || !time || !email){
    alert("Fill everything in!");
    return;
  }

  tickets.push({name, day, time, email});
  saveTickets();
  renderTickets();

  document.getElementById("name").value = "";
  document.getElementById("day").value = "";
  document.getElementById("time").value = "";
  document.getElementById("email").value = "";
}

function deleteOne(index){
  tickets.splice(index, 1);
  saveTickets();
  renderTickets();
}

function deleteAll(){
  if(confirm("Are you sure?")){
    tickets = [];
    saveTickets();
    renderTickets();
  }
}

renderTickets();

</script>

</body>
</html>
